<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CEA — Iniciar Sesión</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <main class="login-wrapper">
    <div class="login-card" id="loginCard">

        <div class="card-header">
        <h1 class="brand-title">CEA</h1>
        <p class="brand-subtitle">SISTEMA DE GESTIÓN</p>
        </div>

        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <div class="form-group">
        <div class="input-wrapper">
            <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            </span>
            <label class="input-label">Usuario</label>
            <input
            type="email"
            id="emailInput"
            class="input-field"
            placeholder="Ingresa tu correo"
            autocomplete="email"
        />
        </div>
    </div>

    <div class="form-group">
        <div class="input-wrapper">
            <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </span>
            <label class="input-label">Contraseña</label>
            <input
            type="password"
            id="passwordInput"
            class="input-field"
            placeholder="Ingresa tu contraseña"
            autocomplete="current-password"
        />
        <button class="toggle-password" id="togglePassword" type="button" tabindex="-1">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
        </div>
        </div>

        <button class="btn-login" id="btnLogin">
        <span class="btn-text">Ingresar</span>
        <span class="btn-loader" style="display:none;">
            <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
        </span>
        </button>

    </div>
    </main>

<script src="js/auth.js"></script>
</body>
</html>
