<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CEA — Calendario del Maestro</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/perfil-maestro.css" />
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-brand">CEA</span>
      <button class="sidebar-close" id="sidebarClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="clases.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>Clases</span>
      </a>
      <a href="maestros.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Maestros y calendario</span>
      </a>
      <a href="pagos.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        <span>Pagos</span>
      </a>
      <a href="estudiantes.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Estudiantes</span>
      </a>
    </nav>
    <button class="btn-logout" id="btnLogout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Cerrar sesión</span>
    </button>
  </aside>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <main class="main-content">
    <header class="topbar">
      <button class="btn-menu" id="btnMenu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-info">
        <h1 class="topbar-title" id="tituloMaestro">Cargando...</h1>
        <span class="topbar-sub" id="subtituloMaestro">Calendario semanal</span>
      </div>
      <div class="topbar-actions">
        <select id="selectorMaestro" class="selector-maestro"></select>
        <button class="btn-descargar" id="btnDescargar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar lista
        </button>
      </div>
    </header>

    <!-- Banner asignación paso a paso -->
    <div class="banner-nuevo" id="bannerNuevo" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="bannerTexto">—</span>
      <button class="btn-cancelar-asign" id="btnCancelarAsign">Cancelar</button>
    </div>

    <section class="calendario-wrapper">
      <div id="loadingCal" class="loading-msg">Cargando calendario...</div>
      <div class="calendario-scroll" id="calendarioScroll" style="display:none">
        <table class="calendario" id="tablaCal">
          <thead id="calendarioHead"></thead>
          <tbody id="calendarioBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- MODAL: Lista de alumnos del bloque -->
  <div class="modal-overlay" id="modalBloque" style="display:none">
    <div class="modal-box">
      <div class="modal-bloque-header">
        <div>
          <div class="modal-bloque-hora" id="modalBloqueHora">—</div>
          <div class="modal-bloque-clase" id="modalBloqueClase">—</div>
        </div>
        <button class="btn-cerrar-form" id="modalBloqueCerrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-bloque-lista" id="modalBloqueListaAlumnos"></div>
    </div>
  </div>

  <!-- MODAL: Confirmar asignación -->
  <div class="modal-overlay" id="modalAsignar" style="display:none">
    <div class="modal-box">
      <h3 class="modal-title">Confirmar horario</h3>
      <p class="modal-desc" id="modalAsignarDesc">—</p>
      <div class="modal-actions">
        <button class="btn-cancelar" id="modalAsignarCancelar">Cancelar</button>
        <button class="btn-guardar" id="modalAsignarConfirmar">
          <span class="btn-text">Confirmar</span>
          <span class="btn-loader" style="display:none"><svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></span>
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL: Confirmar quitar horario -->


  <script src="js/perfil-maestro.js"></script>
</body>
</html>
